---
- name: Check existence of exim-relay service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ exim_relay_identifier }}.service"
  register: exim_relay_service_stat

- name: Uninstall exim-relay systemd services and files
  when: exim_relay_service_stat.stat.exists | bool
  block:
    - name: Ensure exim-relay systemd service is stopped
      ansible.builtin.service:
        name: "{{ exim_relay_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure exim-relay systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ exim_relay_identifier }}.service"
        state: absent

    - name: Ensure exim-relay path does not exist
      ansible.builtin.file:
        path: "{{ exim_relay_base_path }}"
        state: absent
